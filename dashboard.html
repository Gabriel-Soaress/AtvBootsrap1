<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - FitFlex</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Biblioteca Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<!-- Utilitários do Bootstrap: background, flex e altura mínima -->
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Componente Navbar do Bootstrap -->
    <nav class="navbar navbar-expand-lg barra-navegacao-escura">
        <!-- Container do Bootstrap -->
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">FitFlex</a>

            <!-- Botão toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapse do Bootstrap -->
            <div class="collapse navbar-collapse" id="menuNavegacao">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro.html">Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listagem.html">Listagem</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Container do Bootstrap -->
    <div class="container mt-5">
        <h2 class="mb-4">Dashboard Administrativo</h2>

        <!-- Grid do Bootstrap -->
        <div class="row g-4">

            <!-- Coluna responsiva -->
            <div class="col-12 col-md-6 col-lg-4">

                <!-- Card do Bootstrap com cores utilitárias -->
                <div class="card text-white bg-primary shadow">

                    <!-- Card-body com flexbox -->
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>Total de Usuários</h5>
                            <h3>150</h3>
                        </div>

                        <!-- Ícone do Bootstrap Icons -->
                        <i class="bi bi-people-fill fs-1"></i>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card text-white bg-success shadow">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>Cadastros do Mês</h5>
                            <h3>32</h3>
                        </div>
                        <i class="bi bi-person-plus-fill fs-1"></i>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card text-white bg-danger shadow">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>Alertas Pendentes</h5>
                            <h3>5</h3>
                        </div>
                        <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Rodapé com utilitários do Bootstrap -->
    <footer class="rodape-simples mt-auto py-3 text-center">
        <!-- Container do Bootstrap -->
        <div class="container">
            <span>© 2024 FitFlex. Todos os direitos reservados.</span>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
