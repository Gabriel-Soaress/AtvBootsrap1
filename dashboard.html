<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FitFlex</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg barra-navegacao-escura navbar-dark">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="index.html">FitFlex</a>

            <!-- Botão mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="menuNavegacao">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro.html">Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listagem.html">Listagem</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <!-- Conteúdo -->
    <main class="container mt-5 flex-grow-1">
        <h2 class="mb-4 text-center text-md-start">Dashboard Administrativo</h2>

        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card text-white barra-navegacao-escura shadow h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>Total de Usuários</h5>
                            <h3 class="mb-0">150</h3>
                        </div>
                        <i class="bi bi-people-fill fs-1"></i>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card text-white bg-success shadow h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>Cadastros do Mês</h5>
                            <h3 class="mb-0">32</h3>
                        </div>
                        <i class="bi bi-person-plus-fill fs-1"></i>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card text-white bg-primary shadow h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>Alertas Pendentes</h5>
                            <h3 class="mb-0">5</h3>
                        </div>
                        <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Rodapé -->
    <footer class="rodape-simples mt-auto py-3 text-center">
        <div class="container">
            <span>© 2024 FitFlex. Todos os direitos reservados.</span>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
