<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlex - Cadastro</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="corpo-pagina">

    <!-- Componente Navbar do Bootstrap -->
    <nav class="navbar navbar-expand-lg barra-navegacao-escura">
        <!-- Container do Bootstrap -->
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">FitFlex</a>

            <!-- Botão toggler (mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao" aria-controls="menuNavegacao" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapse do Bootstrap -->
            <div class="collapse navbar-collapse" id="menuNavegacao">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="cadastro.html">Cadastro</a></li>
                    <li class="nav-item"><a class="nav-link" href="listagem.html">Listagem</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Container do Bootstrap -->
    <main class="container conteudo-principal">

        <!-- Grid do Bootstrap (row) -->
        <div class="row alinhamento-centro">

            <!-- Colunas do Bootstrap -->
            <div class="col-md-8 col-lg-6">
                
                <div class="cabecalho-form">
                    <h2>Crie sua Conta</h2>
                    <p>Preencha os dados abaixo para iniciar sua jornada de treinos.</p>
                </div>

                <!-- Formulário com componentes do Bootstrap -->
                <form class="formulario-customizado">

                    <div class="grupo-input">
                        <!-- Label do Bootstrap -->
                        <label for="nome" class="form-label">Nome Completo</label>

                        <!-- Input do Bootstrap -->
                        <input type="text" class="form-control" id="nome" placeholder="Ex: João da Silva" required>
                    </div>

                    <div class="grupo-input">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="joao@exemplo.com" required>
                    </div>

                    <div class="grupo-input">
                        <label for="objetivo" class="form-label">Objetivo Principal</label>

                        <!-- Select do Bootstrap -->
                        <select class="form-select" id="objetivo" required>
                            <option value="" selected disabled>Selecione uma opção...</option>
                            <option value="1">Emagrecimento</option>
                            <option value="2">Hipertrofia (Ganho de Massa)</option>
                            <option value="3">Condicionamento Físico</option>
                            <option value="4">Saúde e Bem-estar</option>
                        </select>
                    </div>

                    <div class="grupo-input-grande">
                        <label for="observacoes" class="form-label">Observações Médicas (Opcional)</label>

                        <!-- Textarea do Bootstrap -->
                        <textarea class="form-control" id="observacoes" rows="3" placeholder="Descreva aqui se possui alguma restrição médica..."></textarea>
                    </div>

                    <div class="botao-container">
                        <!-- Botão do Bootstrap com acionamento de Modal -->
                        <button type="button" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#modalSucesso">
                            Finalizar Cadastro
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <!-- Componente Modal do Bootstrap -->
    <div class="modal fade" id="modalSucesso" tabindex="-1" aria-labelledby="modalSucessoLabel" aria-hidden="true">

        <!-- Dialog do Modal -->
        <div class="modal-dialog modal-dialog-centered">

            <!-- Conteúdo do Modal -->
            <div class="modal-content">

                <!-- Cabeçalho do Modal -->
                <div class="modal-header">
                    <h5 class="modal-title" id="modalSucessoLabel">Cadastro Concluído!</h5>

                    <!-- Botão de fechar -->
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <!-- Corpo do Modal -->
                <div class="modal-body">
                    Seus dados foram enviados com sucesso. Bem-vindo à equipe FitFlex!
                </div>

                <!-- Rodapé do Modal -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <a href="index.html" class="btn btn-primary">Voltar ao Início</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Rodapé com utilitários do Bootstrap -->
    <footer class="rodape-simples">
        <!-- Container do Bootstrap -->
        <div class="container">
            <span>© 2026 FitFlex. Todos os direitos reservados.</span>
        </div>
    </footer>

    <!-- Bootstrap JS (necessário para modal e navbar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
